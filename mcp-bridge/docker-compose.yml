version: '3.8'

services:
  bos-ai-rag-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bos-ai-rag-mcp-bridge
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - RAG_API_BASE=https://r0qa9lzhgi.execute-api.ap-northeast-2.amazonaws.com/dev/rag
      - NODE_ENV=production
    restart: always
    networks:
      - obot-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  obot-network:
    external: true
    name: obot-network
