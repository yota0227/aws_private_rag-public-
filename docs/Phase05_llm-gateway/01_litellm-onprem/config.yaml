general_settings:
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  callbacks: ["smtp_email"]

  # ===================================================================
  # Self-Serve 정책 (Model B) — 개인이 자기 API 키를 직접 관리
  # ===================================================================
  # 유저는 초대 링크로 로그인 -> 비번 설정 -> 본인 키 생성/조회/삭제,
  # 본인 사용량(모델별/비용) 확인. 모델은 그룹(openai-models 등)으로만 노출.
  # 예산 전략: 1개월은 "개인 $100" 기준으로 운영 -> 사용량 보고 팀예산 전환 검토.
  # -------------------------------------------------------------------

  # [1] 유저 단위 예산 — 한 사람의 모든 키 사용량 합산 기준
  max_internal_user_budget: 100
  internal_user_budget_duration: "30d"

  # [2] 신규 유저 기본값 (초대받아 처음 로그인 시 자동 부여)
  default_internal_user_params:
    user_role: "internal_user"
    max_budget: 100
    budget_duration: "30d"
    models: ["openai-models"]          # 그룹만 노출 (개별 모델명 숨김)
                                       # Claude 필요 팀은 user/team 에 anthropic-models 추가

  # [3] 유저가 키 생성 시 적용되는 "기본값" (명시 안 한 값에 적용)
  #     - 개인 예산($100)과 일치시켜 "키 $10에서 막히는" 혼란 제거
  #     - rate limit 으로 agent 폭주(하루 예산 단번 소진) 억제
  default_key_generate_params:
    models: ["openai-models"]          # 그룹만
    max_budget: 100                    # 유저 예산과 동일 (별도 키 상한 안 둠)
    budget_duration: "30d"
    rpm_limit: 30                      # 분당 30요청 (사람+agent 충분, 연타 폭주 억제)
    tpm_limit: 200000                  # 분당 20만 토큰 (분당 비용 상한 효과)
    max_parallel_requests: 4           # 동시 4요청 (agent 병렬 폭주 억제)

  # [4] 키 생성 상한 — 유저가 직접 값을 올려도 넘을 수 없는 천장
  upperbound_key_generate_params:
    max_budget: 100                    # 키 1개당 최대 $100 (유저 예산 초과 방지)
    budget_duration: "30d"
    rpm_limit: 60                      # 상한 RPM (기본 30, 최대 60까지 허용)
    tpm_limit: 500000                  # 상한 TPM
    max_parallel_requests: 8           # 상한 동시요청

  # [5] 신규 팀 기본값 — 멤버가 자기 키를 생성/조회할 수 있도록 권한 부여
  #     (기존 팀은 /team/permissions_update 로 소급 적용 필요)
  default_team_params:
    team_member_permissions:
      - "/key/generate"
      - "/key/info"
      - "/key/list"
